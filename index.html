<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Iowble — Guess the Small Iowa Town</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 1em auto; padding: 0 1em; background:#f7f5ee; color:#222; }
  h1 { text-align:center; margin-bottom:0; }
  .sub { text-align:center; color:#555; margin-top:.25em; }
  .row { display:flex; gap:.5em; margin:1em 0; }
  input, button { font-size:1em; padding:.5em; }
  input { flex:1; }
  button { background:#3a6; color:white; border:0; border-radius:4px; cursor:pointer; }
  button:hover { background:#284; }
  .guess { display:flex; justify-content:space-between; padding:.5em .75em; margin:.3em 0; border-radius:4px; color:#111; }
  .closest { font-weight:bold; text-align:center; margin:.5em 0; }
  .win { background:#ffd24a; padding:1em; border-radius:6px; text-align:center; font-size:1.1em; margin:1em 0; }
  datalist { display:none; }
  .meta { font-size:.85em; color:#666; text-align:center; }
  .footer { margin-top:2em; font-size:.8em; color:#888; text-align:center; }
</style>
</head>
<body>
<h1>Iowble</h1>
<p class="sub">Guess the secret Iowa town (pop. &lt; 5,000)</p>
<div class="row">
  <input id="guess" list="towns" placeholder="Type an Iowa town…" autocomplete="off">
  <button id="go">Guess</button>
</div>
<datalist id="towns"></datalist>
<div id="status" class="meta">Guesses: 0</div>
<div id="closest" class="closest"></div>
<div id="result"></div>
<div id="history"></div>
<button id="reset" style="background:#999;margin-top:1em;">New Game</button>
<p class="footer">Inspired by Globle. Distances are great-circle miles.</p>

["Wilton",41.5878,-91.0167,2802],["Woodbine",41.7372,-95.7039,1583]

const $ = id => document.getElementById(id);
const dl = $("towns");
TOWNS.forEach(t => { const o = document.createElement("option"); o.value = t[0]; dl.appendChild(o); });
let target = null, guesses = [], closest = null;
function newGame() {
  target = TOWNS[Math.floor(Math.random() * TOWNS.length)];
  guesses = []; closest = null;
  render(); $("guess").value = ""; $("guess").focus();
}
function distMiles(a, b) {
  const R = 3958.8, toRad = x => x * Math.PI / 180;
  const dLat = toRad(b[1]-a[1]), dLon = toRad(b[2]-a[2]);
  const lat1 = toRad(a[1]), lat2 = toRad(b[1]);
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}
function bearing(a, b) {
  const toRad = x => x * Math.PI / 180, toDeg = x => x * 180 / Math.PI;
  const lat1 = toRad(a[1]), lat2 = toRad(b[1]), dLon = toRad(b[2]-a[2]);
  const y = Math.sin(dLon)*Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (toDeg(Math.atan2(y,x))+360)%360;
}
function arrowFor(deg) {
  const dirs = ["N","NE","E","SE","S","SW","W","NW"];
  const arrows = ["\u2B06","\u2197","\u27A1","\u2198","\u2B07","\u2199","\u2B05","\u2196"];
  const i = Math.round(deg/45)%8;
  return arrows[i]+" "+dirs[i];
}
function colorFor(miles) {
  const max = 350, t = Math.min(miles/max, 1);
  let r, g, b;
  if (t < 0.33) { const k = t/0.33; r=255; g=80+(210-80)*k; b=80; }
  else if (t < 0.66) { const k = (t-0.33)/0.33; r=255+(160-255)*k; g=210+(220-210)*k; b=80+(120-80)*k; }
  else { const k = (t-0.66)/0.34; r=160+(140-160)*k; g=220+(180-220)*k; b=120+(230-120)*k; }
  return "rgb("+(r|0)+","+(g|0)+","+(b|0)+")";
}
function submitGuess() {
  const name = $("guess").value.trim();
  if (!name) return;
  const town = TOWNS.find(t => t[0].toLowerCase() === name.toLowerCase());
  if (!town) { alert("\""+name+"\" isn't in the list. Try another small Iowa town."); return; }
  if (guesses.some(g => g.town[0] === town[0])) { alert("Already guessed."); return; }
  const d = distMiles(town, target), b = bearing(town, target);
  guesses.push({ town, dist: d, dir: arrowFor(b) });
  if (closest === null || d < closest.dist) closest = { town, dist: d };
  $("guess").value = ""; render();
}
function render() {
  $("status").textContent = "Guesses: " + guesses.length;
  $("closest").textContent = closest ? "Closest so far: " + closest.town[0] + " (" + closest.dist.toFixed(1) + " mi)" : "";
  const won = guesses.some(g => g.town[0] === target[0]);
  $("result").innerHTML = won
    ? "<div class=\"win\">\uD83C\uDF89 You got it! The town was <b>" + target[0] + "</b> (pop. " + target[3].toLocaleString() + ") in " + guesses.length + " guess" + (guesses.length>1?"es":"") + ".</div>" : "";
  const h = guesses.slice().reverse().map(g => {
    const pct = Math.max(0, Math.min(100, 100-(g.dist/350)*100));
    return "<div class=\"guess\" style=\"background:" + colorFor(g.dist) + "\"><span>" + g.town[0] + "</span><span>" + g.dist.toFixed(1) + " mi " + g.dir + "</span><span>" + pct.toFixed(0) + "%</span></div>";
  }).join("");
  $("history").innerHTML = h;
}
$("go").onclick = submitGuess;
$("guess").addEventListener("keydown", e => { if (e.key === "Enter") submitGuess(); });
$("reset").onclick = newGame;
newGame();
</script>
</body>
</html>
