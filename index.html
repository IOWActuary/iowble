<title>Iowble — Guess the Iowa Town</title>
<style>

  h1 { text-align:center; margin-bottom:0; }
  .sub { text-align:center; color:#555; margin-top:.25em; }
  .row { display:flex; gap:.5em; margin:1em 0; }
  input, button { font-size:1em; padding:.5em; }
  input { flex:1; }
  button { background:#3a6; color:white; border:0; border-radius:4px; cursor:pointer; }
  button:hover { background:#284; }
  .guess { display:flex; justify-content:space-between; padding:.5em .75em; margin:.3em 0; border-radius:4px; color:#111; }
  .closest { font-weight:bold; text-align:center; margin:.5em 0; }
  .win { background:#ffd24a; padding:1em; border-radius:6px; text-align:center; font-size:1.1em; margin:1em 0; }
  datalist { display:none; }
  .meta { font-size:.85em; color:#666; text-align:center; }
  .footer { margin-top:2em; font-size:.8em; color:#888; text-align:center; }
  #map { width: 100%; height: auto; background:#eef3ec; border-radius:6px; border:1px solid #ccc; display:block; }
  .map-wrap { margin: 0.5em 0; }
  .legend { font-size:.8em; color:#555; text-align:center; margin-top:.25em; }
</style>
</head>
<body>
<h1>Iowble</h1>
<p class="sub">Guess the secret Iowa town (target population &lt; 5,000) — any Iowa town is a valid guess.</p>

<div class="map-wrap">
  <svg id="map" viewBox="0 0 500 300" preserveAspectRatio="xMidYMid meet"></svg>
  <div class="legend">Gray dots: all towns in dataset · Colored pins: your guesses · ⭐ closest so far</div>
</div>

<div class="row">
  <input id="guess" list="towns" placeholder="Type any Iowa town…" autocomplete="off">
  <button id="go">Guess</button>
</div>
<datalist id="towns"></datalist>

<div id="status" class="meta">Guesses: 0</div>
<div id="closest" class="closest"></div>
<div id="result"></div>
<div id="history"></div>

<button id="reset" style="background:#999;margin-top:1em;">New Game</button>

<p class="footer">Inspired by Globle. Distances are great-circle miles. Target is always a small town (&lt; 5,000 pop).</p>

const $ = id => document.getElementById(id);
const dl = $("towns");
TOWNS.forEach(t => { const o = document.createElement("option"); o.value = t[0]; dl.appendChild(o); });
const SMALL = TOWNS.filter(t => t[3] < 5000);

let target = null, guesses = [], closest = null;

const BBOX = { latN: 43.55, latS: 40.35, lonW: -96.70, lonE: -90.10 };
const MAP_W = 500, MAP_H = 300;
function project(lat, lon) {
  const x = (lon - BBOX.lonW) / (BBOX.lonE - BBOX.lonW) * MAP_W;
  const y = (BBOX.latN - lat) / (BBOX.latN - BBOX.latS) * MAP_H;
  return [x, y];
}

function drawBaseMap() {
  const svg = $("map");
  // Iowa state outline as a simplified polygon (clockwise from NW corner)
  const outline = [
    [43.501,-96.639],[43.501,-91.220],[43.300,-91.218],[43.200,-91.100],
    [43.000,-91.155],[42.860,-91.155],[42.700,-91.090],[42.500,-90.700],

    [40.500,-91.420],[40.378,-91.380],[40.380,-95.770],[40.580,-95.770],
    [40.700,-95.820],[40.900,-95.800],[41.180,-95.880],[41.400,-95.940],
    [41.560,-95.880],[41.700,-95.870],[41.910,-95.860],[42.100,-96.080],
    [42.270,-96.350],[42.490,-96.410],[42.700,-96.540],[42.840,-96.520],
    [43.000,-96.470],[43.200,-96.580],[43.501,-96.639]
  ];
  const pts = outline.map(([la,lo]) => project(la,lo).join(",")).join(" ");
  const ns = "http://www.w3.org/2000/svg";
  // background polygon
  const poly = document.createElementNS(ns, "polygon");
  poly.setAttribute("points", pts);
  poly.setAttribute("fill", "#f3efe0");
  poly.setAttribute("stroke", "#888");
  poly.setAttribute("stroke-width", "1");
  svg.appendChild(poly);
  // all town dots
  for (const t of TOWNS) {
    const [x,y] = project(t[1], t[2]);
    const c = document.createElementNS(ns, "circle");
    c.setAttribute("cx", x); c.setAttribute("cy", y);
    c.setAttribute("r", t[3] >= 50000 ? 3 : (t[3] >= 10000 ? 2.2 : 1.4));
    c.setAttribute("fill", "#999");
    c.setAttribute("opacity", "0.55");
    svg.appendChild(c);
  }
}

function clearMapOverlays() {
  const svg = $("map");
  svg.querySelectorAll("[data-overlay]").forEach(el => el.remove());
}

function colorFor(miles) {
  const max = 350, t = Math.min(miles/max, 1);
  let r, g, b;
  if (t < 0.33) { const k = t/0.33; r=255; g=80+(210-80)*k; b=80; }
  else if (t < 0.66) { const k = (t-0.33)/0.33; r=255+(160-255)*k; g=210+(220-210)*k; b=80+(120-80)*k; }
  else { const k = (t-0.66)/0.34; r=160+(140-160)*k; g=220+(180-220)*k; b=120+(230-120)*k; }
  return "rgb("+(r|0)+","+(g|0)+","+(b|0)+")";
}

function drawOverlays() {
  clearMapOverlays();
  const svg = $("map");
  const ns = "http://www.w3.org/2000/svg";
  for (const g of guesses) {
    const [x,y] = project(g.town[1], g.town[2]);
    const c = document.createElementNS(ns, "circle");
    c.setAttribute("cx", x); c.setAttribute("cy", y);
    c.setAttribute("r", 4.5);
    c.setAttribute("fill", colorFor(g.dist));
    c.setAttribute("stroke", "#222");
    c.setAttribute("stroke-width", "0.8");
    c.setAttribute("data-overlay", "1");
    const title = document.createElementNS(ns,"title");
    title.textContent = g.town[0]+" — "+g.dist.toFixed(1)+" mi "+g.dir;
    c.appendChild(title);
    svg.appendChild(c);
    const lbl = document.createElementNS(ns,"text");
    lbl.setAttribute("x", x+6); lbl.setAttribute("y", y-4);
    lbl.setAttribute("font-size", "8"); lbl.setAttribute("fill", "#222");
    lbl.setAttribute("data-overlay","1");
    lbl.textContent = g.town[0];
    svg.appendChild(lbl);
  }
  if (closest) {
    const [x,y] = project(closest.town[1], closest.town[2]);
    const star = document.createElementNS(ns, "text");
    star.setAttribute("x", x); star.setAttribute("y", y+4);
    star.setAttribute("font-size", "14");
    star.setAttribute("text-anchor", "middle");
    star.setAttribute("data-overlay", "1");
    star.textContent = "★";
    star.setAttribute("fill", "#d80");
    svg.appendChild(star);
  }
}

function distMiles(a, b) {
  const R = 3958.8, toRad = x => x * Math.PI / 180;
  const dLat = toRad(b[1]-a[1]), dLon = toRad(b[2]-a[2]);
  const lat1 = toRad(a[1]), lat2 = toRad(b[1]);
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}
function bearing(a, b) {
  const toRad = x => x * Math.PI / 180, toDeg = x => x * 180 / Math.PI;
  const lat1 = toRad(a[1]), lat2 = toRad(b[1]), dLon = toRad(b[2]-a[2]);
  const y = Math.sin(dLon)*Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (toDeg(Math.atan2(y,x))+360)%360;
}
function arrowFor(deg) {
  const dirs = ["N","NE","E","SE","S","SW","W","NW"];
  const arrows = ["\u2B06","\u2197","\u27A1","\u2198","\u2B07","\u2199","\u2B05","\u2196"];
  const i = Math.round(deg/45)%8;
  return arrows[i]+" "+dirs[i];
}

function newGame() {
  target = SMALL[Math.floor(Math.random() * SMALL.length)];
  guesses = []; closest = null;
  render(); $("guess").value = ""; $("guess").focus();
}

function submitGuess() {
  const name = $("guess").value.trim();
  if (!name) return;
  const town = TOWNS.find(t => t[0].toLowerCase() === name.toLowerCase());
  if (!town) { alert("\""+name+"\" isn't in the Iowa town list. Try another."); return; }
  if (guesses.some(g => g.town[0] === town[0])) { alert("Already guessed."); return; }
  const d = distMiles(town, target), b = bearing(town, target);
  guesses.push({ town, dist: d, dir: arrowFor(b) });
  if (closest === null || d < closest.dist) closest = { town, dist: d };
  $("guess").value = ""; render();
}

function render() {
  $("status").textContent = "Guesses: " + guesses.length;
  $("closest").textContent = closest ? "Closest so far: " + closest.town[0] + " (" + closest.dist.toFixed(1) + " mi)" : "";
  const won = guesses.some(g => g.town[0] === target[0]);
  $("result").innerHTML = won
    ? "<div class=\"win\">\uD83C\uDF89 You got it! The town was <b>" + target[0] + "</b> (pop. " + target[3].toLocaleString() + ") in " + guesses.length + " guess" + (guesses.length>1?"es":"") + ".</div>" : "";
  const h = guesses.slice().reverse().map(g => {
    const pct = Math.max(0, Math.min(100, 100-(g.dist/350)*100));
    return "<div class=\"guess\" style=\"background:" + colorFor(g.dist) + "\"><span>" + g.town[0] + " <small style=\"opacity:.6\">(pop "+g.town[3].toLocaleString()+")</small></span><span>" + g.dist.toFixed(1) + " mi " + g.dir + "</span><span>" + pct.toFixed(0) + "%</span></div>";
  }).join("");
  $("history").innerHTML = h;
  drawOverlays();
}

$("go").onclick = submitGuess;
$("guess").addEventListener("keydown", e => { if (e.key === "Enter") submitGuess(); });
$("reset").onclick = newGame;

drawBaseMap();
newGame();
</script>
